<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JobInsightSentry - 哨兵配置</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
        <h2 class="mb-0">🕵️ 配置我的求職哨兵</h2>
    </div>
    <div class="card-body">
        <form action="/api/config/save" method="POST">
            <div class="mb-3">
                <label class="form-label">使用者名稱</label>
                <input type="text" name="username" class="form-control" placeholder="例如: MyJobHunter" required>
            </div>
            <div class="mb-3">
                <label class="form-label">搜尋關鍵字</label>
                <input type="text" name="searchKeyword" class="form-control" placeholder="例如: Java 工程師" required>
            </div>
            <div class="mb-3">
                <label class="form-label">最低月薪要求 (NTD)</label>
                <input type="number" name="minSalary" class="form-control" value="50000" required>
            </div>
            <div class="mb-3">
                <label class="form-label">你的 LINE User ID (精準推播地址)</label>
                <input type="text" name="lineUserId" class="form-control" placeholder="Uxxxxxxxxxxxxxxx..." required>
                <div class="form-text text-muted">請去 LINE Developer 控制台的 Messaging API 頁籤最下方查看。</div>
            </div>
            <button type="submit" class="btn btn-success w-100">儲存配置並啟動監控</button>
        </form>
    </div>
</div>

<div class="mt-4 alert alert-info">
    <h5>💡 提示：</h5>
    <p>儲存成功後，系統會在 1 分鐘內自動啟動爬蟲。你可以在控制台 (IntelliJ Console) 查看進度。</p>
</div>

</body>
</html>
